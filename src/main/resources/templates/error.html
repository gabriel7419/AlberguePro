<!-- Página de Erro Genérica -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Erro</title></head>
<body>
<section>
    <div class="card text-center" style="max-width:520px;margin:60px auto">
        <div class="card-body py-5">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:4rem"></i>
            <h2 class="mt-3 text-danger">Oops! Algo deu errado.</h2>
            <p class="text-muted mt-2">
                Ocorreu um erro inesperado.<br>
                Por favor, tente novamente mais tarde ou volte para a página inicial.
            </p>
            <a th:href="@{/}" class="btn btn-primary mt-3">
                <i class="bi bi-house"></i> Voltar para a Página Inicial
            </a>
        </div>
    </div>
    <script th:inline="javascript">
        var errorMsg = /*[[${exception != null ? exception.message : ''}]]*/ '';
        if (errorMsg) console.error('Detalhes:', errorMsg);
    </script>
</section>
<script></script>
</body>
</html>
