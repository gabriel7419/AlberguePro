<!-- Lista de Usuários (Admin) -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Lista de Usuários</title></head>
<body>
<section>
    <div th:if="${successMessage}" class="alert alert-success d-flex gap-2 mb-3"><i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span></div>
    <div th:if="${errorMessage}"   class="alert alert-danger d-flex gap-2 mb-3"><i class="bi bi-exclamation-triangle-fill"></i><span th:text="${errorMessage}"></span></div>

    <!-- Filtros -->
    <div class="card mb-3">
        <div class="card-header" style="cursor:pointer" onclick="toggleFilters()">
            <h3 class="card-title"><i class="bi bi-funnel me-2 text-primary"></i>Filtros</h3>
            <button type="button" class="btn btn-sm btn-secondary ms-auto"><i class="bi bi-chevron-down" id="filterChevron"></i></button>
        </div>
        <div class="card-body" id="filterBody" style="display:none">
            <form th:action="@{/admin/usuarios}" method="get">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label">Nome de Usuário</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Buscar por username..." th:value="${username}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Tipo</label>
                        <select id="role" name="role" class="form-select">
                            <option value="">Todos</option>
                            <option value="MASTER" th:selected="${role == 'MASTER'}">Master</option>
                            <option value="ADMIN"  th:selected="${role == 'ADMIN'}">Administrador</option>
                            <option value="USER"   th:selected="${role == 'USER'}">Usuário</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Status</label>
                        <select id="ativo" name="ativo" class="form-select">
                            <option value="">Todos</option>
                            <option value="true"  th:selected="${ativo == 'true'}">Ativo</option>
                            <option value="false" th:selected="${ativo == 'false'}">Inativo</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary flex-fill"><i class="bi bi-search"></i> Filtrar</button>
                        <a th:href="@{/admin/usuarios}" class="btn btn-secondary"><i class="bi bi-x"></i></a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabela -->
    <div class="card">
        <div class="card-header card-header-blue">
            <h3 class="card-title">Lista de Usuários</h3>
            <div class="d-flex gap-2">
                <a th:href="@{/admin/usuarios/novo}" class="btn btn-sm"><i class="bi bi-plus-lg"></i> Novo</a>
                <a th:href="@{/relatorios/usuarios/pdf}" class="btn btn-sm btn-danger" target="_blank"><i class="bi bi-file-earmark-pdf"></i> PDF</a>
                <a th:href="@{/relatorios/usuarios/excel}" class="btn btn-sm btn-success"><i class="bi bi-file-earmark-excel"></i> Excel</a>
            </div>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(usuarios)}" class="alert alert-info"><i class="bi bi-info-circle me-2"></i>Nenhum usuário cadastrado.</div>
            <div class="table-responsive" th:if="${not #lists.isEmpty(usuarios)}">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="id">ID</th>
                            <th class="sortable" data-sort="username">Usuário</th>
                            <th>Tipo</th>
                            <th class="sortable" data-sort="ativo">Status</th>
                            <th class="sortable" data-sort="dataCriacao">Data de Criação</th>
                            <th style="width:160px">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="usuario : ${usuarios}">
                            <td th:text="${usuario.id}"></td>
                            <td th:text="${usuario.username}"></td>
                            <td th:text="${usuario.role}"></td>
                            <td>
                                <span th:if="${usuario.ativo}"    class="badge bg-success">Ativo</span>
                                <span th:unless="${usuario.ativo}" class="badge bg-danger">Inativo</span>
                            </td>
                            <td th:text="${usuario.dataCriacao != null ? #temporals.format(usuario.dataCriacao, 'dd/MM/yyyy HH:mm') : 'N/A'}"></td>
                            <td>
                                <div class="d-flex gap-1 flex-wrap">
                                    <!-- Toggle Ativo/Inativo (desabilitado) -->
                                    <button th:if="${(isAdmin && !isMaster && usuario.role == 'MASTER') || (isAdmin && !isMaster && usuario.role == 'ADMIN' && usuario.username != usernameLogado)}"
                                            type="button"
                                            class="btn btn-sm disabled"
                                            th:classappend="${usuario.ativo ? 'btn-outline-success' : 'btn-outline-danger'}"
                                            style="opacity:0.5;cursor:not-allowed"
                                            data-bs-toggle="tooltip"
                                            th:title="${usuario.role == 'MASTER' ? 'Apenas Masters podem gerenciar outros Masters' : 'Admins não podem gerenciar outros admins'}">
                                        <i class="bi" th:classappend="${usuario.ativo ? 'bi-toggle-on' : 'bi-toggle-off'}"></i>
                                    </button>
                                    <!-- Toggle habilitado -->
                                    <form th:unless="${(isAdmin && !isMaster && usuario.role == 'MASTER') || (isAdmin && !isMaster && usuario.role == 'ADMIN' && usuario.username != usernameLogado)}"
                                          th:action="@{/admin/usuarios/toggle/{id}(id=${usuario.id})}" method="post" style="display:inline">
                                        <button type="submit" class="btn btn-sm" data-bs-toggle="tooltip"
                                                th:classappend="${usuario.ativo ? 'btn-outline-success' : 'btn-outline-danger'}"
                                                th:title="${usuario.ativo ? 'Desativar usuário' : 'Ativar usuário'}">
                                            <i class="bi" th:classappend="${usuario.ativo ? 'bi-toggle-on' : 'bi-toggle-off'}"></i>
                                        </button>
                                    </form>

                                    <!-- Editar (desabilitado) -->
                                    <a th:if="${(isAdmin && !isMaster && usuario.username != usernameLogado && (usuario.role == 'ADMIN' || usuario.role == 'MASTER')) || (!isMaster && usuario.role == 'MASTER')}"
                                       href="javascript:void(0);" class="btn btn-warning btn-sm disabled" style="opacity:0.5;cursor:not-allowed"
                                       data-bs-toggle="tooltip" th:title="${usuario.role == 'MASTER' ? 'Apenas Masters podem editar Masters' : 'Não é permitido editar outro admin'}">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <!-- Editar habilitado -->
                                    <a th:unless="${(isAdmin && !isMaster && usuario.username != usernameLogado && (usuario.role == 'ADMIN' || usuario.role == 'MASTER')) || (!isMaster && usuario.role == 'MASTER')}"
                                       th:href="@{/admin/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-warning btn-sm"
                                       data-bs-toggle="tooltip" title="Editar usuário">
                                        <i class="bi bi-pencil"></i>
                                    </a>

                                    <!-- Alterar Senha (desabilitado) -->
                                    <a th:if="${(isAdmin && !isMaster && usuario.username != usernameLogado && (usuario.role == 'ADMIN' || usuario.role == 'MASTER')) || (!isMaster && usuario.role == 'MASTER')}"
                                       href="javascript:void(0);" class="btn btn-info btn-sm disabled" style="opacity:0.5;cursor:not-allowed"
                                       data-bs-toggle="tooltip" th:title="${usuario.role == 'MASTER' ? 'Apenas Masters podem alterar senha de Masters' : 'Não é permitido alterar senha de outro admin'}">
                                        <i class="bi bi-key"></i>
                                    </a>
                                    <!-- Alterar Senha habilitado -->
                                    <a th:unless="${(isAdmin && !isMaster && usuario.username != usernameLogado && (usuario.role == 'ADMIN' || usuario.role == 'MASTER')) || (!isMaster && usuario.role == 'MASTER')}"
                                       th:href="@{/admin/usuarios/alterar-senha/{id}(id=${usuario.id})}" class="btn btn-info btn-sm"
                                       data-bs-toggle="tooltip" title="Alterar senha">
                                        <i class="bi bi-key"></i>
                                    </a>

                                    <!-- Excluir habilitado -->
                                    <form th:if="${usuario.role == 'ADMIN' ? isMaster : usuario.role != 'MASTER'}"
                                          th:action="@{/admin/usuarios/excluir/{id}(id=${usuario.id})}" method="post" style="display:inline">
                                        <button type="submit" class="btn btn-danger btn-sm btn-confirm-delete-form"
                                                data-confirm-message="Tem certeza que deseja excluir este usuário?"
                                                data-bs-toggle="tooltip" title="Excluir usuário">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                    <!-- Excluir desabilitado -->
                                    <button th:unless="${usuario.role == 'ADMIN' ? isMaster : usuario.role != 'MASTER'}"
                                            type="button" class="btn btn-danger btn-sm disabled"
                                            style="opacity:0.5;cursor:not-allowed" data-bs-toggle="tooltip"
                                            th:title="${usuario.role == 'MASTER' ? 'Não é possível excluir Masters' : 'Apenas Masters podem excluir Admins'}">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="fragments/pagination :: pagination"></div>
        </div>
    </div>
    <div th:replace="fragments/confirmation-modal :: confirmationModal"></div>
</section>
<script>
function toggleFilters() {
    var body = document.getElementById('filterBody');
    var icon = document.getElementById('filterChevron');
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    icon.className = open ? 'bi bi-chevron-down' : 'bi bi-chevron-up';
}
document.addEventListener('DOMContentLoaded', function() {
    var u = document.getElementById('username');
    if (u && u.value) {
        document.getElementById('filterBody').style.display = 'block';
        document.getElementById('filterChevron').className = 'bi bi-chevron-up';
    }

    // Forms no modal de confirmação
    var targetForm = null;
    document.querySelectorAll('.btn-confirm-delete-form').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            targetForm = this.closest('form');
            var msg = this.getAttribute('data-confirm-message');
            var msgEl = document.getElementById('confirmDeleteMessage');
            if (msg && msgEl) msgEl.innerHTML = msg;
            var modal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
            modal.show();
        });
    });

    var confirmBtn = document.getElementById('confirmDeleteBtn');
    if (confirmBtn) {
        confirmBtn.addEventListener('click', function() {
            if (targetForm) targetForm.submit();
        });
    }

    document.getElementById('confirmDeleteModal')?.addEventListener('hidden.bs.modal', function() {
        targetForm = null;
        var msgEl = document.getElementById('confirmDeleteMessage');
        if (msgEl) msgEl.innerHTML = 'Tem certeza que deseja realizar esta exclusão?';
    });
});
</script>
<script th:replace="fragments/confirmation-modal :: confirmationScript"></script>
</body>
</html>
