<!-- Fragment: Modal de Confirmação de Exclusão -->
<!-- Uso: th:replace="fragments/confirmation-modal :: confirmationModal" -->
<!-- Script: th:replace="fragments/confirmation-modal :: confirmationScript" -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>

<!-- Modal de confirmação (Bootstrap 5) -->
<div th:fragment="confirmationModal">
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-danger">
                    <h5 class="modal-title text-white" id="confirmDeleteLabel">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>Confirmar Exclusão
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body" id="confirmDeleteMessage">
                    Tem certeza que deseja realizar esta exclusão?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">
                        <i class="bi bi-x"></i> Cancelar
                    </button>
                    <a id="confirmDeleteBtn" href="#" class="btn btn-danger btn-sm">
                        <i class="bi bi-trash"></i> Confirmar
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Script para botões do tipo link (href) de exclusão -->
<th:block th:fragment="confirmationScript">
<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.btn-confirm-delete').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            var url = this.getAttribute('href');
            var msg = this.getAttribute('data-confirm-message');
            var confirmBtn = document.getElementById('confirmDeleteBtn');
            var msgEl     = document.getElementById('confirmDeleteMessage');
            if (url && confirmBtn) confirmBtn.setAttribute('href', url);
            if (msg && msgEl)      msgEl.innerHTML = msg;
            var modal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
            modal.show();
        });
    });
});
</script>
</th:block>

</body>
</html>
