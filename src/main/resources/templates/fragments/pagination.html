<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>

<!-- Fragmento de paginação reutilizável -->
<div th:fragment="pagination">
    <div class="d-flex flex-wrap align-items-center justify-content-between mt-3 gap-3" th:if="${page != null and page.totalPages > 0}">
        <!-- Seletor de itens por página + Info -->
        <div class="d-flex align-items-center gap-3">
            <div class="d-flex align-items-center gap-2">
                <label class="form-label mb-0" style="white-space:nowrap;font-size:13px">Itens por página:</label>
                <select class="form-select form-select-sm page-size-selector" style="width:80px" th:attr="data-size=${size}">
                    <option value="5"  th:selected="${size == 5}">5</option>
                    <option value="10" th:selected="${size == 10}">10</option>
                    <option value="15" th:selected="${size == 15}">15</option>
                    <option value="20" th:selected="${size == 20}">20</option>
                    <option value="25" th:selected="${size == 25}">25</option>
                </select>
            </div>
            <span class="text-muted" style="font-size:12.5px">
                Mostrando <strong th:text="${page.numberOfElements}"></strong> de <strong th:text="${page.totalElements}"></strong> registros
            </span>
        </div>

        <!-- Botões de navegação -->
        <nav aria-label="Paginação">
            <ul class="pagination mb-0" th:with="currentPage=${page.number}">
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link page-nav-link" th:attr="data-page=0" aria-label="Primeira">&laquo;&laquo;</a>
                </li>
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link page-nav-link" th:attr="data-page=${page.number - 1}" aria-label="Anterior">&laquo;</a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                    th:if="${i >= (page.number - 2 < 0 ? 0 : page.number - 2) and i <= (page.number + 2 >= page.totalPages ? page.totalPages - 1 : page.number + 2)}"
                    th:classappend="${i == page.number} ? 'active'">
                    <a class="page-link page-nav-link" th:attr="data-page=${i}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link page-nav-link" th:attr="data-page=${page.number + 1}" aria-label="Próxima">&raquo;</a>
                </li>
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link page-nav-link" th:attr="data-page=${page.totalPages - 1}" aria-label="Última">&raquo;&raquo;</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var params = new URLSearchParams(window.location.search);

    // Destacar colunas ordenadas
    var currentSort = params.get('sort') || '';
    var currentDir  = params.get('dir')  || 'asc';
    document.querySelectorAll('.sortable[data-sort]').forEach(function(th) {
        if (th.getAttribute('data-sort') === currentSort) {
            th.classList.add(currentDir === 'asc' ? 'asc' : 'desc');
        }
        th.addEventListener('click', function() {
            var col = this.getAttribute('data-sort');
            var dir = (col === currentSort && currentDir === 'asc') ? 'desc' : 'asc';
            params.set('sort', col);
            params.set('dir', dir);
            params.set('page', '0');
            window.location.href = window.location.pathname + '?' + params.toString();
        });
    });

    // Navegação de página
    document.querySelectorAll('.page-nav-link').forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            var p = this.getAttribute('data-page');
            if (p === null) return;
            params.set('page', p);
            window.location.href = window.location.pathname + '?' + params.toString();
        });
    });

    // Seletor de tamanho de página
    document.querySelectorAll('.page-size-selector').forEach(function(sel) {
        sel.addEventListener('change', function() {
            params.set('size', this.value);
            params.set('page', '0');
            window.location.href = window.location.pathname + '?' + params.toString();
        });
    });
});
</script>

</body>
</html>
