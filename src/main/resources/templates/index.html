<!-- Página inicial (Dashboard) -->
<!DOCTYPE html>
<!-- Puxa o layout principal -->
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<body>
<section>
    <!-- Linha de Caixas de Informação -->
    <div class="row g-3 mb-4">
        <div class="col-lg-3 col-sm-6">
            <div class="stat-card indigo">
                <div class="stat-info">
                    <div class="stat-number" th:text="${dashboard.totalAcolhidos}">0</div>
                    <div class="stat-label">Acolhidos Ativos</div>
                </div>
                <i class="bi bi-people-fill stat-icon"></i>
            </div>
        </div>
        <div class="col-lg-3 col-sm-6">
            <div class="stat-card teal">
                <div class="stat-info">
                    <div class="stat-number" th:text="${dashboard.leitosLivres} + ' / ' + ${dashboard.totalLeitos}">0 / 0</div>
                    <div class="stat-label">Leitos Livres</div>
                </div>
                <i class="bi bi-hospital stat-icon"></i>
            </div>
        </div>
        <div class="col-lg-3 col-sm-6">
            <div class="stat-card amber">
                <div class="stat-info">
                    <div class="stat-number" th:text="${dashboard.quartosLivres} + ' / ' + ${dashboard.totalQuartos}">0 / 0</div>
                    <div class="stat-label">Quartos Livres</div>
                </div>
                <i class="bi bi-door-open-fill stat-icon"></i>
            </div>
        </div>
        <div class="col-lg-3 col-sm-6">
            <div class="stat-card rose">
                <div class="stat-info">
                    <div class="stat-number" th:text="${dashboard.totalUsuarios}">0</div>
                    <div class="stat-label">Usuários do Sistema</div>
                </div>
                <i class="bi bi-shield-fill-check stat-icon"></i>
            </div>
        </div>
    </div>

    <!-- Linha dos Gráficos -->
    <div class="row g-3">
        <!-- Coluna 1 - Patrimônio e Estoque -->
        <div class="col-lg-4">
            <!-- Gráfico de Patrimônio -->
            <div class="card mb-3">
                <div class="card-header">
                    <h3 class="card-title"><i class="bi bi-pie-chart me-2 text-primary"></i>Patrimônio por Status</h3>
                </div>
                <div class="card-body">
                    <div id="chartPatrimonio" style="height: 260px;"></div>
                    <div th:if="${#maps.isEmpty(dashboard.patrimonioPorStatus)}" class="text-center p-3">
                        <p class="text-muted">Nenhum patrimônio cadastrado</p>
                    </div>
                </div>
            </div>

            <!-- Gráfico de Estoque Baixo -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title"><i class="bi bi-exclamation-triangle me-2 text-danger"></i>Estoque Baixo (Top 5)</h3>
                </div>
                <div class="card-body">
                    <div id="chartEstoque" style="height: 260px;"></div>
                    <div th:if="${produtosBaixoEstoque.source.isEmpty()}" class="text-center p-3">
                        <p class="text-muted">Nenhum produto com estoque baixo</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Coluna 2 - Leitos -->
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-header">
                    <h3 class="card-title"><i class="bi bi-bar-chart me-2 text-info"></i>Situação dos Leitos</h3>
                </div>
                <div class="card-body">
                    <div id="chartLeitos" style="height: 560px;"></div>
                </div>
            </div>
        </div>

        <!-- Coluna 3 - Evolução de Acolhimentos -->
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-header">
                    <h3 class="card-title"><i class="bi bi-graph-up me-2 text-success"></i>Evolução de Acolhimentos (6 meses)</h3>
                </div>
                <div class="card-body">
                    <div id="chartEvolucao" style="height: 560px;"></div>
                </div>
            </div>
        </div>
    </div>
</section>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        function getDataLabelColor() {
            return document.documentElement.getAttribute('data-theme') === 'dark' ? '#fff' : '#000';
        }
        function getLabelColor() {
            return document.documentElement.getAttribute('data-theme') === 'dark' ? '#94a3b8' : '#6c757d';
        }
        function getTitleColor() {
            return document.documentElement.getAttribute('data-theme') === 'dark' ? '#f1f5f9' : '#343a40';
        }
        function getTooltipTheme() {
            return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        }

        var chartPatrimonio, chartLeitos, chartEstoque, chartEvolucao;

        // Dados do Patrimônio
        var patrimonioData = /*[[${dashboard.patrimonioPorStatus}]]*/ {};

        if (Object.keys(patrimonioData).length > 0) {
            var patrimonioLabels = [], patrimonioValues = [], patrimonioColors = [];
            var statusColors = {
                'Em Uso': '#4f46e5', 'Disponivel': '#10b981',
                'Em Manutencao': '#f59e0b', 'Baixado': '#ef4444'
            };
            var fallbackColors = ['#8b5cf6', '#06b6d4', '#84cc16', '#f97316'];
            var fi = 0;
            for (var key in patrimonioData) {
                patrimonioLabels.push(key);
                patrimonioValues.push(patrimonioData[key]);
                patrimonioColors.push(statusColors[key] || fallbackColors[fi++ % fallbackColors.length]);
            }
            chartPatrimonio = new ApexCharts(document.querySelector("#chartPatrimonio"), {
                series: patrimonioValues, chart: { type: 'donut', height: 260, toolbar: { show: false } },
                labels: patrimonioLabels, colors: patrimonioColors,
                legend: { position: 'bottom', fontSize: '12px', labels: { colors: getLabelColor() } },
                dataLabels: { enabled: true, formatter: function(val, opts) { return opts.w.config.series[opts.seriesIndex]; }, style: { colors: [getDataLabelColor()], fontWeight: 'bold' }, dropShadow: { enabled: false } },
                plotOptions: { pie: { donut: { size: '60%', labels: { show: true, total: { show: true, label: 'Total', color: getLabelColor() } } } } },
                tooltip: { theme: getTooltipTheme() }
            });
            chartPatrimonio.render();
        }

        // Leitos
        var leitosOcupados = /*[[${dashboard.leitosOcupados}]]*/ 0;
        var leitosLivres = /*[[${dashboard.leitosLivres}]]*/ 0;
        chartLeitos = new ApexCharts(document.querySelector("#chartLeitos"), {
            series: [{ name: 'Quantidade', data: [leitosOcupados, leitosLivres] }],
            chart: { type: 'bar', height: 560, toolbar: { show: false } },
            plotOptions: { bar: { horizontal: true, distributed: true, barHeight: '40%', dataLabels: { position: 'top' } } },
            colors: ['#ef4444', '#10b981'],
            dataLabels: { enabled: true, offsetX: 30, style: { fontWeight: 'bold', colors: [getDataLabelColor()] } },
            xaxis: { categories: ['Ocupados', 'Livres'], labels: { style: { colors: getLabelColor() } } },
            yaxis: { labels: { style: { colors: getLabelColor() } } },
            legend: { show: false },
            tooltip: { theme: getTooltipTheme() },
            grid: { borderColor: '#e2e8f0', strokeDashArray: 3 }
        });
        chartLeitos.render();

        // Estoque
        var produtosEstoque = /*[[${produtosBaixoEstoque.source}]]*/ [];
        if (produtosEstoque.length > 0) {
            var top5 = produtosEstoque.slice(0, 5);
            chartEstoque = new ApexCharts(document.querySelector("#chartEstoque"), {
                series: [{ name: 'Quantidade', data: top5.map(function(p) { return p.quantidade; }) }],
                chart: { type: 'bar', height: 260, toolbar: { show: false } },
                plotOptions: { bar: { horizontal: true, barHeight: '60%', dataLabels: { position: 'top' } } },
                colors: ['#ef4444'],
                dataLabels: { enabled: true, offsetX: 25, style: { fontWeight: 'bold', colors: [getDataLabelColor()] } },
                xaxis: { categories: top5.map(function(p) { return p.nome; }), labels: { style: { colors: getLabelColor() } } },
                yaxis: { labels: { style: { colors: getLabelColor() }, maxWidth: 120 } },
                tooltip: { theme: getTooltipTheme() },
                grid: { borderColor: '#e2e8f0', strokeDashArray: 3 }
            });
            chartEstoque.render();
        }

        // Evolução
        var mesesEvolucao = /*[[${dashboard.mesesEvolucao}]]*/ [];
        var entradasEvolucao = /*[[${dashboard.entradasEvolucao}]]*/ [];
        var saidasEvolucao = /*[[${dashboard.saidasEvolucao}]]*/ [];
        chartEvolucao = new ApexCharts(document.querySelector("#chartEvolucao"), {
            series: [{ name: 'Entradas', data: entradasEvolucao }, { name: 'Saídas', data: saidasEvolucao }],
            chart: { type: 'line', height: 560, toolbar: { show: false }, zoom: { enabled: false } },
            colors: ['#10b981', '#ef4444'],
            stroke: { width: 3, curve: 'smooth' },
            dataLabels: { enabled: true, style: { fontSize: '11px', fontWeight: 'bold' } },
            markers: { size: 5, strokeWidth: 2, hover: { size: 7 } },
            xaxis: { categories: mesesEvolucao, labels: { style: { colors: getLabelColor() } } },
            yaxis: { labels: { style: { colors: getLabelColor() } } },
            legend: { position: 'top', horizontalAlign: 'center', fontSize: '12px', labels: { colors: getLabelColor() } },
            tooltip: { theme: getTooltipTheme() },
            grid: { borderColor: '#e2e8f0', strokeDashArray: 3 }
        });
        chartEvolucao.render();

        // Dark mode update
        window.addEventListener('darkModeToggled', function() {
            var opts = function() { return {
                dataLabels: { style: { colors: [getDataLabelColor()] } },
                xaxis: { labels: { style: { colors: getLabelColor() } } },
                yaxis: { labels: { style: { colors: getLabelColor() } } },
                legend: { labels: { colors: getLabelColor() } },
                tooltip: { theme: getTooltipTheme() }
            }; };
            if (chartPatrimonio) chartPatrimonio.updateOptions(opts());
            if (chartLeitos) chartLeitos.updateOptions(opts());
            if (chartEstoque) chartEstoque.updateOptions(opts());
            if (chartEvolucao) chartEvolucao.updateOptions(opts());
        });
    });
</script>
</body>
</html>
