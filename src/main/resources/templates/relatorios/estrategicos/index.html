<!-- Relatórios Estratégicos - índice -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Relatórios Estratégicos</title></head>
<body>
<section>
    <div class="card">
        <div class="card-header card-header-blue">
            <h3 class="card-title">Relatórios Estratégicos</h3>
        </div>
        <div class="card-body">
            <div class="row g-4 mt-2">
                <!-- Acolhidos -->
                <div class="col-md-4">
                    <a th:href="@{/relatorios/estrategicos/acolhidos}" class="text-decoration-none">
                        <div class="stat-card" style="--card-color:var(--primary)">
                            <div class="stat-icon"><i class="bi bi-people-fill"></i></div>
                            <div class="stat-info">
                                <h3 class="stat-number">Acolhidos</h3>
                                <p class="stat-label">Entradas de Acolhidos<br><small><i class="bi bi-arrow-right-circle"></i> Gerar Relatório</small></p>
                            </div>
                        </div>
                    </a>
                </div>
                <!-- Movimentação Estoque -->
                <div class="col-md-4">
                    <a th:href="@{/relatorios/estrategicos/movimentacao-estoque}" class="text-decoration-none">
                        <div class="stat-card" style="--card-color:var(--success)">
                            <div class="stat-icon"><i class="bi bi-arrow-left-right"></i></div>
                            <div class="stat-info">
                                <h3 class="stat-number">Estoque</h3>
                                <p class="stat-label">Movimentação de Estoque<br><small><i class="bi bi-arrow-right-circle"></i> Gerar Relatório</small></p>
                            </div>
                        </div>
                    </a>
                </div>
                <!-- Ocupação -->
                <div class="col-md-4">
                    <a th:href="@{/relatorios/estrategicos/vagas}" class="text-decoration-none">
                        <div class="stat-card" style="--card-color:var(--warning)">
                            <div class="stat-icon"><i class="bi bi-graph-up-arrow"></i></div>
                            <div class="stat-info">
                                <h3 class="stat-number">Ocupação</h3>
                                <p class="stat-label">Evolução da Ocupação<br><small><i class="bi bi-arrow-right-circle"></i> Gerar Relatório</small></p>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
<script></script>
</body>
</html>
