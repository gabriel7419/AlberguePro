<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Relatório de Movimentação de Estoque</title></head>
<body>
<section>
    <div th:if="${errorMessage}" class="alert alert-danger d-flex gap-2 mb-3"><i class="bi bi-exclamation-triangle-fill"></i><span th:text="${errorMessage}"></span></div>

    <!-- Filtros -->
    <div class="card mb-3">
        <div class="card-header" style="cursor:pointer" onclick="toggleFilters()">
            <h3 class="card-title"><i class="bi bi-funnel me-2 text-primary"></i>Filtros</h3>
            <button type="button" class="btn btn-sm btn-secondary ms-auto"><i class="bi bi-chevron-down" id="filterChevron"></i></button>
        </div>
        <div class="card-body" id="filterBody" style="display:none">
            <form id="filtroForm" method="get">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label"><i class="bi bi-calendar me-1"></i>Data Início</label>
                        <input type="date" id="dataInicio" name="dataInicio" class="form-control" th:value="${dataInicio}" required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label"><i class="bi bi-calendar me-1"></i>Data Fim</label>
                        <input type="date" id="dataFim" name="dataFim" class="form-control" th:value="${dataFim}" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label"><i class="bi bi-filter me-1"></i>Tipo</label>
                        <select id="tipo" name="tipo" class="form-select">
                            <option value="">Todos</option>
                            <option value="ENTRADA">Entrada</option>
                            <option value="SAIDA">Saída</option>
                            <option value="AJUSTE_POSITIVO">Ajuste Positivo</option>
                            <option value="AJUSTE_NEGATIVO">Ajuste Negativo</option>
                            <option value="EXCLUSAO">Exclusão</option>
                        </select>
                    </div>
                </div>
                <div class="mt-3">
                    <label class="form-label"><i class="bi bi-clock me-1"></i>Períodos Rápidos:</label>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="setPeriodo('hoje')">Hoje</button>
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="setPeriodo('semana')">Esta Semana</button>
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="setPeriodo('mes')">Este Mês</button>
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="setPeriodo('ultimomes')">Último Mês</button>
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="setPeriodo('trimestre')">Último Trimestre</button>
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="setPeriodo('semestre')">Último Semestre</button>
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="setPeriodo('ano')">Este Ano</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Card Principal -->
    <div class="card">
        <div class="card-header card-header-blue">
            <div class="d-flex justify-content-between align-items-center flex-wrap w-100">
                <h3 class="card-title mb-0"><i class="bi bi-arrow-left-right me-2"></i>Relatório de Movimentação de Estoque por Período</h3>
                <div class="d-flex gap-2 mt-2 mt-md-0">
                    <button type="button" id="btnPdf" class="btn btn-danger btn-sm"><i class="bi bi-file-earmark-pdf"></i> Gerar PDF</button>
                    <button type="button" id="btnExcel" class="btn btn-success btn-sm"><i class="bi bi-file-earmark-excel"></i> Gerar Excel</button>
                    <a th:href="@{/relatorios/estrategicos}" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left"></i> Voltar</a>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="alert alert-info"><i class="bi bi-info-circle me-1"></i>Selecione o período e o tipo de movimentação nos filtros acima. Clique em "Gerar PDF" ou "Gerar Excel".</div>
        </div>
    </div>
</section>
<script>
function toggleFilters() {
    var body = document.getElementById('filterBody');
    var icon = document.getElementById('filterChevron');
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    icon.className = open ? 'bi bi-chevron-down' : 'bi bi-chevron-up';
}

function setPeriodo(tipo) {
    var hoje = new Date();
    var dataInicio, dataFim = hoje;
    switch(tipo) {
        case 'hoje':     dataInicio = hoje; break;
        case 'semana':   dataInicio = new Date(hoje); dataInicio.setDate(hoje.getDate() - hoje.getDay()); break;
        case 'mes':      dataInicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1); break;
        case 'ultimomes':dataInicio = new Date(hoje.getFullYear(), hoje.getMonth() - 1, 1); dataFim = new Date(hoje.getFullYear(), hoje.getMonth(), 0); break;
        case 'trimestre':dataInicio = new Date(hoje); dataInicio.setMonth(hoje.getMonth() - 3); break;
        case 'semestre': dataInicio = new Date(hoje); dataInicio.setMonth(hoje.getMonth() - 6); break;
        case 'ano':      dataInicio = new Date(hoje.getFullYear(), 0, 1); break;
    }
    document.getElementById('dataInicio').value = formatDate(dataInicio);
    document.getElementById('dataFim').value = formatDate(dataFim);
}

function formatDate(date) {
    return date.getFullYear() + '-' +
           String(date.getMonth() + 1).padStart(2, '0') + '-' +
           String(date.getDate()).padStart(2, '0');
}

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('btnPdf').addEventListener('click', function() {
        var di = document.getElementById('dataInicio').value;
        var df = document.getElementById('dataFim').value;
        var tipo = document.getElementById('tipo').value;
        if (!di || !df || new Date(di) > new Date(df)) return;
        var url = '/relatorios/estrategicos/movimentacao-estoque/pdf?dataInicio=' + di + '&dataFim=' + df;
        if (tipo) url += '&tipo=' + tipo;
        window.open(url, '_blank');
    });
    document.getElementById('btnExcel').addEventListener('click', function() {
        var di = document.getElementById('dataInicio').value;
        var df = document.getElementById('dataFim').value;
        var tipo = document.getElementById('tipo').value;
        if (!di || !df || new Date(di) > new Date(df)) return;
        var url = '/relatorios/estrategicos/movimentacao-estoque/excel?dataInicio=' + di + '&dataFim=' + df;
        if (tipo) url += '&tipo=' + tipo;
        window.location.href = url;
    });
});
</script>
</body>
</html>
