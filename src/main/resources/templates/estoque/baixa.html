<!-- Tela de baixa de estoque -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Baixa de Estoque</title></head>
<body>
<section>
    <!-- Alerts -->
    <div id="errorBanner" class="alert alert-danger d-flex align-items-center gap-2 mb-3" style="display:none!important" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span id="errorBannerMsg"></span>
        <button type="button" class="btn-close ms-auto" onclick="document.getElementById('errorBanner').style.display='none'"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${errorMessage}"></span>
    </div>
    <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span>
    </div>

    <!-- Filtros -->
    <div class="card mb-3">
        <div class="card-header" style="cursor:pointer" onclick="toggleFilters()">
            <h3 class="card-title"><i class="bi bi-funnel me-2 text-primary"></i>Filtros</h3>
            <button type="button" class="btn btn-sm btn-secondary ms-auto"><i class="bi bi-chevron-down" id="filterChevron"></i></button>
        </div>
        <div class="card-body" id="filterBody" style="display:none">
            <form th:action="@{/estoque/baixa}" method="get">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome do Produto</label>
                        <input type="text" name="filtro" id="filtro" class="form-control" placeholder="Buscar produto..." th:value="${filtro}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Tipo</label>
                        <select id="tipo" name="tipo" class="form-select">
                            <option value="">Todos</option>
                            <option value="Alimento" th:selected="${tipo == 'Alimento'}">Alimento</option>
                            <option value="Higiene"  th:selected="${tipo == 'Higiene'}">Higiene</option>
                            <option value="Limpeza"  th:selected="${tipo == 'Limpeza'}">Limpeza</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary flex-fill"><i class="bi bi-search"></i> Filtrar</button>
                        <a th:href="@{/estoque/baixa}" class="btn btn-secondary"><i class="bi bi-x"></i></a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabela -->
    <div class="card">
        <div class="card-header card-header-blue">
            <h3 class="card-title">Baixa em Produtos do Estoque</h3>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th style="width:120px">Qtd. Atual</th>
                            <th style="width:150px">Unidade</th>
                            <th style="width:260px">Quantidade para Baixa</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="produto : ${produtos}">
                            <td th:text="${produto.nome}">Arroz</td>
                            <td th:text="${produto.quantidade}">50</td>
                            <td th:text="${produto.unidade.nome}">kg</td>
                            <td>
                                <form th:action="@{/estoque/dar-baixa}" method="post" class="baixa-form"
                                      th:data-produto-nome="${produto.nome}"
                                      th:data-quantidade-max="${produto.quantidade}">
                                    <input type="hidden" name="produtoId" th:value="${produto.id}">
                                    <div class="input-group">
                                        <input type="number" name="quantidade" class="form-control quantidade-input"
                                               placeholder="0" min="1" th:max="${produto.quantidade}">
                                        <button type="submit" class="btn btn-success">Salvar</button>
                                    </div>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="fragments/pagination :: pagination"></div>
        </div>
    </div>
</section>
<script>
function toggleFilters() {
    var body = document.getElementById('filterBody');
    var icon = document.getElementById('filterChevron');
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    icon.className = open ? 'bi bi-chevron-down' : 'bi bi-chevron-up';
}

document.addEventListener('DOMContentLoaded', function() {
    var filtro = document.getElementById('filtro');
    var tipo   = document.getElementById('tipo');
    if ((filtro && filtro.value) || (tipo && tipo.value)) {
        document.getElementById('filterBody').style.display = 'block';
        document.getElementById('filterChevron').className = 'bi bi-chevron-up';
    }

    document.querySelectorAll('.baixa-form').forEach(function(form) {
        form.addEventListener('submit', function(e) {
            var input = form.querySelector('.quantidade-input');
            var qty = parseInt(input.value);
            var max = parseInt(form.getAttribute('data-quantidade-max'));
            var nome = form.getAttribute('data-produto-nome');
            if (!input.value || isNaN(qty) || qty <= 0) {
                e.preventDefault();
                showError('Informe uma quantidade válida para "' + nome + '".');
                return;
            }
            if (qty > max) {
                e.preventDefault();
                showError('Quantidade (' + qty + ') excede o disponível (' + max + ') para "' + nome + '".');
            }
        });
    });
});

function showError(msg) {
    var banner = document.getElementById('errorBanner');
    document.getElementById('errorBannerMsg').textContent = msg;
    banner.style.display = 'flex';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(function() { banner.style.display = 'none'; }, 5000);
}
</script>
</body>
</html>
