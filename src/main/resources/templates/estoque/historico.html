<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Histórico de Movimentações de Estoque</title></head>
<body>
<section>
    <!-- Filtros -->
    <div class="card mb-3">
        <div class="card-header" style="cursor:pointer" onclick="toggleFilters()">
            <h3 class="card-title"><i class="bi bi-funnel me-2 text-primary"></i>Filtros</h3>
            <button type="button" class="btn btn-sm btn-secondary ms-auto"><i class="bi bi-chevron-down" id="filterChevron"></i></button>
        </div>
        <div class="card-body" id="filterBody" style="display:none">
            <form th:action="@{/estoque/historico}" method="get">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label">Produto</label>
                        <input type="text" id="nomeProduto" name="nomeProduto" th:value="${nomeProduto}" class="form-control" placeholder="Buscar por produto...">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tipo de Movimentação</label>
                        <select id="tipo" name="tipo" class="form-select">
                            <option value="">Todos</option>
                            <option value="ENTRADA"         th:selected="${tipo == 'ENTRADA'}">Entrada</option>
                            <option value="SAIDA"           th:selected="${tipo == 'SAIDA'}">Saída</option>
                            <option value="AJUSTE_POSITIVO" th:selected="${tipo == 'AJUSTE_POSITIVO'}">Ajuste Positivo</option>
                            <option value="AJUSTE_NEGATIVO" th:selected="${tipo == 'AJUSTE_NEGATIVO'}">Ajuste Negativo</option>
                            <option value="EXCLUSAO"        th:selected="${tipo == 'EXCLUSAO'}">Exclusão</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary flex-fill"><i class="bi bi-search"></i> Filtrar</button>
                        <a th:href="@{/estoque/historico}" class="btn btn-secondary"><i class="bi bi-x"></i></a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header card-header-blue">
            <h3 class="card-title">Histórico de Movimentações</h3>
            <div class="d-flex gap-2">
                <a th:href="@{/estoque/historico/relatorio/pdf(nomeProduto=${nomeProduto}, tipo=${tipo})}" class="btn btn-sm btn-danger" target="_blank"><i class="bi bi-file-earmark-pdf"></i> PDF</a>
                <a th:href="@{/estoque/historico/relatorio/excel(nomeProduto=${nomeProduto}, tipo=${tipo})}" class="btn btn-sm btn-success"><i class="bi bi-file-earmark-excel"></i> Excel</a>
                <a th:href="@{/estoque}" class="btn btn-sm btn-secondary"><i class="bi bi-arrow-left"></i> Voltar</a>
            </div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="dataMovimentacao">Data e Hora</th>
                            <th>Produto</th>
                            <th class="sortable" data-sort="tipo">Tipo</th>
                            <th class="sortable" data-sort="quantidadeMovimentada">Qtd. Movida</th>
                            <th>Qtd. Anterior</th>
                            <th>Qtd. Posterior</th>
                            <th>Usuário</th>
                            <th>Observação</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="mov : ${movimentacoes}">
                            <td th:text="${#temporals.format(mov.dataMovimentacao, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${mov.produto != null ? mov.produto.nome : 'Produto Excluído'}"></td>
                            <td>
                                <span class="badge"
                                    th:classappend="${mov.tipo.name() == 'ENTRADA' ? 'badge-success' :
                                        (mov.tipo.name() == 'SAIDA' ? 'badge-warning' :
                                        (mov.tipo.name() == 'AJUSTE_POSITIVO' ? 'badge-info' :
                                        (mov.tipo.name() == 'AJUSTE_NEGATIVO' ? 'badge-secondary' : 'badge-danger')))}"
                                    th:text="${mov.tipo.name().replace('_', ' ')}"></span>
                            </td>
                            <td th:text="${mov.quantidadeMovimentada}"></td>
                            <td th:text="${mov.quantidadeAnterior}"></td>
                            <td th:text="${mov.quantidadePosterior}"></td>
                            <td th:text="${mov.usuario != null ? mov.usuario.username : 'N/A'}"></td>
                            <td th:text="${mov.observacao}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(movimentacoes)}">
                            <td colspan="8" class="text-center text-muted py-4">Nenhuma movimentação registrada.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="fragments/pagination :: pagination"></div>
        </div>
    </div>
</section>
<script>
function toggleFilters() {
    var body = document.getElementById('filterBody');
    var icon = document.getElementById('filterChevron');
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    icon.className = open ? 'bi bi-chevron-down' : 'bi bi-chevron-up';
}
document.addEventListener('DOMContentLoaded', function() {
    var np = document.getElementById('nomeProduto');
    var t  = document.getElementById('tipo');
    if ((np && np.value) || (t && t.value)) {
        document.getElementById('filterBody').style.display = 'block';
        document.getElementById('filterChevron').className = 'bi bi-chevron-up';
    }
});
</script>
</body>
</html>
