<!-- Lista de Quartos -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Lista de Quartos</title></head>
<body>
<section>
    <div th:if="${errorMessage}"   class="alert alert-danger d-flex gap-2 mb-3"><i class="bi bi-exclamation-triangle-fill"></i><span th:text="${errorMessage}"></span></div>
    <div th:if="${successMessage}" class="alert alert-success d-flex gap-2 mb-3"><i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span></div>

    <!-- Filtros -->
    <div class="card mb-3">
        <div class="card-header" style="cursor:pointer" onclick="toggleFilters()">
            <h3 class="card-title"><i class="bi bi-funnel me-2 text-primary"></i>Filtros</h3>
            <button type="button" class="btn btn-sm btn-secondary ms-auto"><i class="bi bi-chevron-down" id="filterChevron"></i></button>
        </div>
        <div class="card-body" id="filterBody" style="display:none">
            <form th:action="@{/quarto/pesquisar}" method="get">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label">Número do Quarto</label>
                        <input type="text" id="filtro" name="filtro" class="form-control" placeholder="Buscar por número..." th:value="${filtro}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Disponibilidade</label>
                        <select id="disponibilidade" name="disponibilidade" class="form-select">
                            <option value="">Todos</option>
                            <option value="disponivel" th:selected="${disponibilidade == 'disponivel'}">Com vagas</option>
                            <option value="ocupado"    th:selected="${disponibilidade == 'ocupado'}">Lotado</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary flex-fill"><i class="bi bi-search"></i> Filtrar</button>
                        <a th:href="@{/quarto/listar}" class="btn btn-secondary"><i class="bi bi-x"></i></a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabela -->
    <div class="card">
        <div class="card-header card-header-blue">
            <h3 class="card-title">Lista de Quartos</h3>
            <div class="d-flex gap-2">
                <a th:href="@{/quarto/novo}" class="btn btn-sm"><i class="bi bi-plus-lg"></i> Novo Quarto</a>
                <a th:href="@{/quarto/relatorio/ocupacao-pdf}" class="btn btn-sm btn-danger" target="_blank"><i class="bi bi-file-earmark-pdf"></i> PDF</a>
                <a th:href="@{/quarto/relatorio/ocupacao-excel}" class="btn btn-sm btn-success"><i class="bi bi-file-earmark-excel"></i> Excel</a>
            </div>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(quartos)}" class="alert alert-info"><i class="bi bi-info-circle me-2"></i>Nenhum quarto cadastrado.</div>
            <div class="table-responsive" th:if="${not #lists.isEmpty(quartos)}">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="id">ID</th>
                            <th class="sortable" data-sort="numeroQuarto">Número do Quarto</th>
                            <th>Ocupação (Ocupados/Total)</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="quarto : ${quartos}">
                            <td th:text="${quarto.id}"></td>
                            <td th:text="${quarto.numeroQuarto}"></td>
                            <td>
                                <span class="badge badge-info"
                                      th:with="ocupados=${leitosOcupadosPorQuarto[quarto.numeroQuarto] ?: 0}, total=${#lists.size(quarto.leitos)}"
                                      th:text="${ocupados} + '/' + ${total}"></span>
                            </td>
                            <td>
                                <a th:href="@{/quarto/remover/{id}(id=${quarto.id})}"
                                   class="btn btn-danger btn-sm btn-confirm-delete"
                                   data-bs-toggle="tooltip" title="Excluir quarto e leitos"
                                   th:attr="data-confirm-message='Tem certeza que deseja remover o &lt;strong&gt;Quarto ' + ${quarto.numeroQuarto} + '&lt;/strong&gt; e todos os seus leitos?'">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="fragments/pagination :: pagination"></div>
        </div>
    </div>
    <div th:replace="fragments/confirmation-modal :: confirmationModal"></div>
</section>
<script>
function toggleFilters() {
    var body = document.getElementById('filterBody');
    var icon = document.getElementById('filterChevron');
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    icon.className = open ? 'bi bi-chevron-down' : 'bi bi-chevron-up';
}
document.addEventListener('DOMContentLoaded', function() {
    var f = document.getElementById('filtro');
    if (f && f.value) { document.getElementById('filterBody').style.display = 'block'; document.getElementById('filterChevron').className = 'bi bi-chevron-up'; }
});
</script>
<script th:replace="fragments/confirmation-modal :: confirmationScript"></script>
</body>
</html>
