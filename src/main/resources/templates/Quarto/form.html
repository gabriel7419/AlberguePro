<!-- Formulário de Quarto -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Cadastro de Quarto</title></head>
<body>
<section>
    <div th:if="${errorMessage}"   class="alert alert-danger d-flex gap-2 mb-3"><i class="bi bi-exclamation-triangle-fill"></i><span th:text="${errorMessage}"></span></div>
    <div th:if="${successMessage}" class="alert alert-success d-flex gap-2 mb-3"><i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span></div>

    <div class="card">
        <div class="card-header card-header-blue">
            <h3 class="card-title">Gestão de Quartos — Cadastrar</h3>
        </div>
        <form th:action="@{/quarto/salvar}" th:object="${quarto}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="numeroQuarto" class="form-label">Número do Quarto</label>
                        <input type="text" id="numeroQuarto" class="form-control" th:field="*{numeroQuarto}"
                               placeholder="Ex: 01, 02, 10, 15"
                               th:classappend="${#fields.hasErrors('numeroQuarto')} ? 'is-invalid' : ''">
                        <div th:if="${#fields.hasErrors('numeroQuarto')}" th:errors="*{numeroQuarto}" class="invalid-feedback"></div>
                    </div>
                    <div class="col-md-8 d-flex align-items-end">
                        <div class="alert alert-secondary mb-0 w-100">
                            <i class="bi bi-info-circle me-1"></i>
                            Este quarto será criado com <strong>4 leitos</strong> (Leito 01, 02, 03 e 04) automaticamente.
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer d-flex gap-2">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Salvar</button>
                <a th:href="@{/quarto/listar}" class="btn btn-secondary"><i class="bi bi-x"></i> Cancelar</a>
            </div>
        </form>
    </div>
</section>
<script></script>
</body>
</html>
