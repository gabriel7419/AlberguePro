<!-- Lista de Vagas -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Lista de Vagas</title></head>
<body>
<section>
    <div th:if="${errorMessage}"   class="alert alert-danger d-flex gap-2 mb-3"><i class="bi bi-exclamation-triangle-fill"></i><span th:text="${errorMessage}"></span></div>
    <div th:if="${successMessage}" class="alert alert-success d-flex gap-2 mb-3"><i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span></div>

    <!-- Filtros -->
    <div class="card mb-3">
        <div class="card-header" style="cursor:pointer" onclick="toggleFilters()">
            <h3 class="card-title"><i class="bi bi-funnel me-2 text-primary"></i>Filtros</h3>
            <button type="button" class="btn btn-sm btn-secondary ms-auto"><i class="bi bi-chevron-down" id="filterChevron"></i></button>
        </div>
        <div class="card-body" id="filterBody" style="display:none">
            <form th:action="@{/vaga/pesquisar}" method="get">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label">Nome do Acolhido</label>
                        <input type="text" id="filtro" name="filtro" class="form-control" placeholder="Buscar vaga pelo nome..." th:value="${filtro}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Quarto</label>
                        <input type="number" id="numeroQuarto" name="numeroQuarto" class="form-control" placeholder="Nº" th:value="${numeroQuarto}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Leito</label>
                        <input type="number" id="numeroLeito" name="numeroLeito" class="form-control" placeholder="Nº" th:value="${numeroLeito}">
                    </div>
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary flex-fill"><i class="bi bi-search"></i> Filtrar</button>
                        <a th:href="@{/vaga/listar}" class="btn btn-secondary"><i class="bi bi-x"></i></a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabela -->
    <div class="card">
        <div class="card-header card-header-blue">
            <h3 class="card-title">Lista de Vagas Cadastradas</h3>
            <a th:href="@{/vaga}" class="btn btn-sm"><i class="bi bi-plus-lg"></i> Nova Vaga</a>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(vagas)}" class="alert alert-info"><i class="bi bi-info-circle me-2"></i>Nenhuma vaga cadastrada.</div>
            <div class="table-responsive" th:if="${not #lists.isEmpty(vagas)}">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="acolhido.nome">Acolhido</th>
                            <th class="sortable" data-sort="dataEntrada">Data de Ingresso</th>
                            <th class="sortable" data-sort="dataSaida">Data de Saída</th>
                            <th class="sortable" data-sort="leito.numeroLeito">Leito</th>
                            <th class="sortable" data-sort="leito.quarto.numeroQuarto">Quarto</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="vaga : ${vagas}">
                            <td th:text="${vaga.acolhido != null} ? ${vaga.acolhido.nome} : '---'"></td>
                            <td th:text="${vaga.dataEntrada != null} ? ${#temporals.format(vaga.dataEntrada,'dd/MM/yyyy')} : '---'"></td>
                            <td th:text="${vaga.dataSaida != null} ? ${#temporals.format(vaga.dataSaida,'dd/MM/yyyy')} : '---'"></td>
                            <td th:text="${vaga.leito != null} ? ${vaga.leito.numeroLeito} : '---'"></td>
                            <td th:text="${vaga.leito != null and vaga.leito.quarto != null} ? ${vaga.leito.quarto.numeroQuarto} : '---'"></td>
                            <td class="d-flex gap-1">
                                <a th:href="@{/vaga/editar/{id}(id=${vaga.id})}" class="btn btn-warning btn-sm"
                                   data-bs-toggle="tooltip" title="Editar vaga"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/vaga/remover/{id}(id=${vaga.id})}"
                                   class="btn btn-danger btn-sm btn-confirm-delete"
                                   data-bs-toggle="tooltip" title="Excluir vaga"
                                   data-confirm-message="Tem certeza que deseja remover esta vaga?"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="fragments/pagination :: pagination"></div>
        </div>
    </div>
    <div th:replace="fragments/confirmation-modal :: confirmationModal"></div>
</section>
<script>
function toggleFilters() {
    var body = document.getElementById('filterBody');
    var icon = document.getElementById('filterChevron');
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    icon.className = open ? 'bi bi-chevron-down' : 'bi bi-chevron-up';
}
document.addEventListener('DOMContentLoaded', function() {
    var f = document.getElementById('filtro');
    if (f && f.value) { document.getElementById('filterBody').style.display = 'block'; document.getElementById('filterChevron').className = 'bi bi-chevron-up'; }
});
</script>
<script th:replace="fragments/confirmation-modal :: confirmationScript"></script>
</body>
</html>
