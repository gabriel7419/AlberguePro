<!-- Formulário de Vaga (Cadastrar/Editar) -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Cadastro de Vaga</title></head>
<body>
<section>
    <div th:if="${errorMessage}"   class="alert alert-danger d-flex gap-2 mb-3"><i class="bi bi-exclamation-triangle-fill"></i><span th:text="${errorMessage}"></span></div>
    <div th:if="${successMessage}" class="alert alert-success d-flex gap-2 mb-3"><i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span></div>

    <div class="card">
        <div class="card-header card-header-blue">
            <h3 class="card-title">Gestão de Vagas — Cadastrar</h3>
        </div>
        <form th:action="@{/vaga/salvar}" th:object="${vaga}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="card-body">
                <div class="row g-3">
                    <!-- Acolhido -->
                    <div class="col-md-6">
                        <label class="form-label">Acolhido</label>
                        <select class="form-select" th:field="*{acolhido.id}" id="acolhidoSelect"
                                th:classappend="${#fields.hasErrors('acolhido.id')} ? 'is-invalid' : ''">
                            <option value="">Selecione o Acolhido...</option>
                            <option th:each="a : ${acolhidos}" th:value="${a.id}" th:text="${a.nome}"></option>
                        </select>
                        <div th:if="${#fields.hasErrors('acolhido.id')}" th:errors="*{acolhido.id}" class="invalid-feedback"></div>
                    </div>
                    <!-- Quarto -->
                    <div class="col-md-3">
                        <label class="form-label">Quarto</label>
                        <select class="form-select" id="quarto">
                            <option value="">Selecione o Quarto...</option>
                            <option th:each="q : ${quartos}" th:value="${q.id}"
                                    th:text="'Quarto ' + ${q.numeroQuarto}"
                                    th:selected="${quartoSelecionadoId != null and quartoSelecionadoId == q.id}"></option>
                        </select>
                    </div>
                    <!-- Leito -->
                    <div class="col-md-3">
                        <label class="form-label">Leito</label>
                        <select class="form-select" id="leito" th:field="*{leito.id}"
                                th:classappend="${#fields.hasErrors('leito')} ? 'is-invalid' : ''">
                            <option value="">Selecione o Leito...</option>
                        </select>
                        <div th:if="${#fields.hasErrors('leito')}" th:errors="*{leito}" class="invalid-feedback"></div>
                    </div>
                    <!-- Data de Ingresso -->
                    <div class="col-md-3">
                        <label for="dataEntrada" class="form-label">Data de Ingresso</label>
                        <input type="date" class="form-control" id="dataEntrada" th:field="*{dataEntrada}" readonly
                               th:classappend="${#fields.hasErrors('dataEntrada')} ? 'is-invalid' : ''">
                        <div th:if="${#fields.hasErrors('dataEntrada')}" th:errors="*{dataEntrada}" class="invalid-feedback"></div>
                    </div>
                    <!-- Data de Saída -->
                    <div class="col-md-3">
                        <label for="dataSaida" class="form-label">Data de Saída</label>
                        <input type="date" class="form-control" id="dataSaida" th:field="*{dataSaida}" readonly
                               th:classappend="${#fields.hasErrors('dataSaida')} ? 'is-invalid' : ''">
                        <div th:if="${#fields.hasErrors('dataSaida')}" th:errors="*{dataSaida}" class="invalid-feedback"></div>
                    </div>
                </div>
            </div>
            <div class="card-footer d-flex gap-2">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Salvar</button>
                <a th:href="@{/vaga/listar}" class="btn btn-secondary"><i class="bi bi-x"></i> Cancelar</a>
            </div>
        </form>
    </div>
</section>
<script th:inline="javascript">
document.addEventListener('DOMContentLoaded', function() {
    var quartoSelect   = document.getElementById('quarto');
    var leitoSelect    = document.getElementById('leito');
    var acolhidoSelect = document.getElementById('acolhidoSelect');
    var dataEntrada    = document.getElementById('dataEntrada');
    var dataSaida      = document.getElementById('dataSaida');
    var vagaId         = /*[[${vaga.id}]]*/ null;

    function carregarLeitos(quartoId, leitoSelecionadoId) {
        leitoSelect.innerHTML = '<option value="">Selecione o Leito...</option>';
        if (!quartoId) return;
        var url = '/vaga/leitos/' + quartoId + (vagaId ? '?vagaId=' + vagaId : '');
        fetch(url)
            .then(function(r) { return r.json(); })
            .then(function(leitos) {
                leitos.forEach(function(leito) {
                    var opt = document.createElement('option');
                    opt.value = leito.id;
                    opt.textContent = 'Leito ' + leito.numeroLeito;
                    if (leitoSelecionadoId && leito.id.toString() === leitoSelecionadoId) opt.selected = true;
                    leitoSelect.appendChild(opt);
                });
            })
            .catch(function(err) { console.error('Erro ao buscar leitos:', err); });
    }

    var quartoIdSalvo = quartoSelect.value;
    var leitoIdSalvo  = leitoSelect.value;
    if (quartoIdSalvo) carregarLeitos(quartoIdSalvo, leitoIdSalvo);

    quartoSelect.addEventListener('change', function() {
        leitoSelect.value = '';
        carregarLeitos(this.value, null);
    });

    if (acolhidoSelect) {
        acolhidoSelect.addEventListener('change', function() {
            dataEntrada.value = '';
            dataSaida.value   = '';
            if (!this.value) return;
            fetch('/vaga/acolhido/datas/' + this.value)
                .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
                .then(function(data) {
                    if (data) {
                        dataEntrada.value = data.dataIngresso || '';
                        dataSaida.value   = data.dataSaida   || '';
                    }
                })
                .catch(function(err) { console.error('Erro ao carregar datas:', err); });
        });
    }
});
</script>
</body>
</html>
