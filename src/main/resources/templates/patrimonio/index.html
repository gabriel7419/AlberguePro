<!-- Lista de Patrimônios -->
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout (~{::title/text()}, ~{::section}, ~{::script})}">
<head><title>Lista de Patrimônios</title></head>
<body>
<section>
    <div th:if="${errorMessage}"   class="alert alert-danger d-flex gap-2 mb-3"><i class="bi bi-exclamation-triangle-fill"></i><span th:text="${errorMessage}"></span></div>
    <div th:if="${successMessage}" class="alert alert-success d-flex gap-2 mb-3"><i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span></div>

    <!-- Filtros -->
    <div class="card mb-3">
        <div class="card-header" style="cursor:pointer" onclick="toggleFilters()">
            <h3 class="card-title"><i class="bi bi-funnel me-2 text-primary"></i>Filtros</h3>
            <button type="button" class="btn btn-sm btn-secondary ms-auto"><i class="bi bi-chevron-down" id="filterChevron"></i></button>
        </div>
        <div class="card-body" id="filterBody" style="display:none">
            <form th:action="@{/patrimonio}" method="get">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Nome</label>
                        <input type="text" id="nome" name="nome" class="form-control" placeholder="Buscar por nome..." th:value="${nome}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Status</label>
                        <select id="status" name="status" class="form-select">
                            <option value="">Todos</option>
                            <option value="Em uso"          th:selected="${status == 'Em uso'}">Em uso</option>
                            <option value="Em manutenção"   th:selected="${status == 'Em manutenção'}">Em manutenção</option>
                            <option value="Em estoque"      th:selected="${status == 'Em estoque'}">Em estoque</option>
                            <option value="Baixado"         th:selected="${status == 'Baixado'}">Baixado</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Local Atual</label>
                        <input type="text" id="localAtual" name="localAtual" class="form-control" placeholder="Ex: Almoxarifado" th:value="${localAtual}">
                    </div>
                    <div class="col-md-2 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-primary flex-fill"><i class="bi bi-search"></i> Filtrar</button>
                        <a th:href="@{/patrimonio}" class="btn btn-secondary"><i class="bi bi-x"></i></a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabela -->
    <div class="card">
        <div class="card-header card-header-blue">
            <h3 class="card-title">Lista de Patrimônios</h3>
            <div class="d-flex gap-2">
                <a th:href="@{/patrimonio/novo}" class="btn btn-sm"><i class="bi bi-plus-lg"></i> Novo</a>
                <a th:href="@{/relatorios/patrimonio/pdf(nome=${nome}, status=${status}, localAtual=${localAtual})}" class="btn btn-sm btn-danger" target="_blank"><i class="bi bi-file-earmark-pdf"></i> PDF</a>
                <a th:href="@{/relatorios/patrimonio/excel(nome=${nome}, status=${status}, localAtual=${localAtual})}" class="btn btn-sm btn-success"><i class="bi bi-file-earmark-excel"></i> Excel</a>
            </div>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(patrimonios)}" class="alert alert-info"><i class="bi bi-info-circle me-2"></i>Nenhum patrimônio cadastrado.</div>
            <div class="table-responsive" th:if="${not #lists.isEmpty(patrimonios)}">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="nome">Nome</th>
                            <th class="sortable" data-sort="patrimonio">Patrimônio</th>
                            <th class="sortable" data-sort="status">Status</th>
                            <th class="sortable" data-sort="dataAquisicao">Data de Aquisição</th>
                            <th class="sortable" data-sort="localAtual">Localização Atual</th>
                            <th>Observação</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${patrimonios}">
                            <td th:text="${p.nome}"></td>
                            <td th:text="${p.patrimonio}"></td>
                            <td th:text="${p.status}"></td>
                            <td th:text="${#temporals.format(p.data_aquisicao, 'dd/MM/yyyy')}"></td>
                            <td th:text="${p.local_atual}"></td>
                            <td th:text="${p.observacao}"></td>
                            <td>
                                <a th:href="@{/patrimonio/editar/{id}(id=${p.id})}" class="btn btn-warning btn-sm"
                                   data-bs-toggle="tooltip" data-bs-placement="top" title="Editar patrimônio">
                                    <i class="bi bi-pencil"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:replace="fragments/pagination :: pagination"></div>
        </div>
    </div>
</section>
<script>
function toggleFilters() {
    var body = document.getElementById('filterBody');
    var icon = document.getElementById('filterChevron');
    var open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    icon.className = open ? 'bi bi-chevron-down' : 'bi bi-chevron-up';
}
document.addEventListener('DOMContentLoaded', function() {
    var nome = document.getElementById('nome');
    var status = document.getElementById('status');
    var local = document.getElementById('localAtual');
    if ((nome && nome.value) || (status && status.value) || (local && local.value)) {
        document.getElementById('filterBody').style.display = 'block';
        document.getElementById('filterChevron').className = 'bi bi-chevron-up';
    }
});
</script>
</body>
</html>
